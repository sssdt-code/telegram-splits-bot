name: Telegram Probe

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest

    steps:
      - name: Send Telegram directly with curl
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          echo "HAS TOKEN: ${#TELEGRAM_TOKEN}"
          echo "HAS CHAT_ID: $CHAT_ID"

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${CHAT_ID}\",\"text\":\"🧪 CURL PROBE FROM GITHUB ACTIONS\"}"